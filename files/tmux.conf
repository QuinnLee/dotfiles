# -----------------------------------------------
# Terminal — tmux-256color is required on M-chip
# Macs; screen-256color breaks italics & true color
# -----------------------------------------------
set -g default-terminal "tmux-256color"
# Enable true (24-bit) color passthrough for modern terminals (iTerm2, Alacritty, etc.)
set-option -sa terminal-overrides ",xterm*:Tc"
set-option -sa terminal-overrides ",tmux*:Tc"

# set scrollback history to 30000 (30k)
set -g history-limit 30000

# -----------------------------------------------
# Prefix: C-a
# -----------------------------------------------
unbind C-b
set -g prefix C-a

# Pass C-a through to the application (e.g. move to line start in shell)
bind C-a send-prefix

# shorten command delay
set -sg escape-time 10

# new window in same directory
bind c new-window -c '#{pane_current_path}'

# set window and pane index to 1 (0 by default)
set-option -g base-index 1
setw -g pane-base-index 1

# Reload config
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# -----------------------------------------------
# Splits
# -----------------------------------------------
bind '\' split-window -h -c "#{pane_current_path}"
bind '-'  split-window -v -c "#{pane_current_path}"

# Make the current window the first window
bind T swap-window -t 1

# -----------------------------------------------
# Pane navigation (Vi keys)
# -----------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Layout shortcuts
bind-key C-i select-layout even-vertical
bind-key C-v select-layout even-horizontal
bind-key C-o resize-pane -y 1000

# Sync panes
bind C-s set-window-option synchronize-panes

# -----------------------------------------------
# Mouse
# -----------------------------------------------
set-option -g mouse on

# -----------------------------------------------
# Copy mode (Vi)
# -----------------------------------------------
setw -g mode-keys vi
setw -g monitor-activity on

# Save pane history to file
bind-key * command-prompt -p 'save history to filename:' -I '~/tmux.history' \
  'capture-pane -S -32768 ; save-buffer %1 ; delete-buffer'

# -----------------------------------------------
# Multistart panes
# -----------------------------------------------
bind-key P run-shell 'tmux-multistart as'
bind-key A run-shell 'tmux-multistart alpha'
bind-key B run-shell 'tmux-multistart beta'
bind-key W run-shell 'tmux-multistart web'
bind-key D run-shell 'tmux-multistart dev'
bind-key X run-shell 'tmux-multistart txhub'   # was T — conflicted with swap-window

bind-key C command-prompt -p "machine(s)/group: " "run-shell 'tmux-multistart %1'"

# -----------------------------------------------
# Colors — pane borders
# -----------------------------------------------
set-option -g pane-border-style        fg=colour235
set-option -g pane-active-border-style fg=colour33

# Command-line message colors
set-option -g message-style bg=black,fg=brightred

# -----------------------------------------------
# Status bar
# -----------------------------------------------
set-option -g status on
set -g status-interval 5
set -g status-justify centre

setw -g monitor-activity on
set  -g visual-activity  on

set-option -g status-style bg=colour235,fg=yellow,dim

set-window-option -g window-status-current-style fg=brightred,bg=colour236,bright
set-window-option -g window-status-style         fg=brightblue,bg=colour236,dim

# -----------------------------------------------
# Status left — cross-platform network info
#
# macOS: uses ifconfig en0 (Wi-Fi) and utun1 (VPN)
# Linux: uses `ip` (standard on all modern distros)
#        for VPN, checks tun0 — adjust if yours differs
#
# Public IP: requires dig (install dnsutils on Debian/Ubuntu
#            or bind-utils on RHEL/Fedora/Arch if missing)
# -----------------------------------------------
set -g status-left-length 100
set -g status-left \
"#[fg=brightblue]#(dig +short myip.opendns.com @resolver1.opendns.com 2>/dev/null) \
#[fg=yellow]#(if [ \"\$(uname)\" = 'Darwin' ]; then \
    ifconfig en0 2>/dev/null | awk '/inet /{print \"en0 \" \$2}'; \
  else \
    ip -4 addr show scope global 2>/dev/null | awk '/inet /{print \$NF \" \" \$2}' | head -1; \
  fi) \
#[fg=red]#(if [ \"\$(uname)\" = 'Darwin' ]; then \
    ifconfig utun1 2>/dev/null | awk '/inet /{print \"vpn \" \$2}'; \
  else \
    ip addr show tun0 2>/dev/null | awk '/inet /{print \"vpn \" \$2}'; \
  fi)"

# Right: pane title, session, date/time, UTC
set -g status-right-length 80
set -g status-right \
  "#[fg=cyan]#{=15:pane_title} : #[fg=blue]#S #I:#P \
#[fg=yellow]: %d %b %Y #[fg=green]: %l:%M %p \
: #(date -u | awk '{print $4}') :"
